<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Image Compressor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f7f9fa; margin: 0; padding: 40px; color: #333; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #A31C21; margin-top: 0; }
        .dropzone { border: 3px dashed #cbd5e1; border-radius: 12px; padding: 60px 20px; transition: all 0.2s; background: #f8fafc; cursor: pointer; margin-bottom: 20px; }
        .dropzone:hover, .dropzone.dragover { border-color: #A31C21; background: #fff1f2; }
        .dropzone p { font-size: 1.2rem; color: #64748b; margin: 0; pointer-events: none; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 20px; text-align: left;}
        .card { border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; margin-bottom: 8px; }
        .card p { margin: 4px 0; font-size: 0.85rem; color: #475569; }
        .success { color: #16a34a; font-weight: 600; }
        .download-btn { display: inline-block; padding: 6px 12px; background: #A31C21; color: white; text-decoration: none; border-radius: 6px; font-size: 0.85rem; margin-top: 6px; }
        .download-btn:hover { background: #82161a; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Fast Image Compressor</h1>
    <p>Drag & drop your heavy 18MB images here to instantly compress them for the website!</p>
    
    <input type="file" id="fileInput" multiple accept="image/jpeg, image/png, image/webp">
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <p>📁 Drag and drop images here, or click to select</p>
    </div>

    <div class="gallery" id="gallery"></div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const gallery = document.getElementById('gallery');
    
    // Setting maximum width to 800px and JPEG quality to 0.75 for web galleries
    const MAX_WIDTH = 800;
    const QUALITY = 0.75;

    // Drag and Drop Events
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        Array.from(files).forEach(file => {
            if (!file.type.match('image.*')) return;
            compressImage(file);
        });
    }

    function compressImage(file) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                // Scale down if larger
                if (width > MAX_WIDTH) {
                    height = Math.round((height * MAX_WIDTH) / width);
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Compress as JPEG
                const dataUrl = canvas.toDataURL('image/jpeg', QUALITY);
                
                // Calculate rough size
                const base64Length = dataUrl.length - 'data:image/jpeg;base64,'.length;
                const sizeInKB = (base64Length * 0.75 / 1024).toFixed(1);
                const originalSizeKB = (file.size / 1024).toFixed(1);
                
                createCard(dataUrl, file.name, originalSizeKB, sizeInKB);
            };
        };
    }

    function createCard(dataUrl, filename, oldSize, newSize) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <img src="${dataUrl}" alt="Preview">
            <p><strong>${filename}</strong></p>
            <p style="text-decoration: line-through;">Original: ${oldSize > 1024 ? (oldSize/1024).toFixed(1) + ' MB' : oldSize + ' KB'}</p>
            <p class="success">New: ${newSize} KB</p>
            <a href="${dataUrl}" download="${filename}" class="download-btn">⬇ Download Compressed</a>
        `;
        gallery.prepend(div);
    }
</script>

</body>
</html>
